name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip actual publish and GitHub release)'
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Branch guard (tag must be on main)
        run: |
          git branch --contains HEAD | grep -q main || \
            { echo "::error::Tagged commit is not reachable from main branch"; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Tar full repo artifact
        run: tar -czf /tmp/release-artifact.tar.gz --exclude='.git' --exclude='node_modules/.cache' .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: /tmp/release-artifact.tar.gz
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-build
          path: .

      - name: Extract artifact
        run: tar -xzf release-artifact.tar.gz && rm release-artifact.tar.gz

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - run: timeout 120 npm test < /dev/null

      - name: Run archgate check
        run: |
          npx archgate --version
          npx archgate check

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-build
          path: .

      - name: Extract artifact
        run: tar -xzf release-artifact.tar.gz && rm release-artifact.tar.gz

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci --omit=dev

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Verify .claude-plugin/plugin.json version matches tag
        run: |
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::.claude-plugin/plugin.json version ($PLUGIN_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Pre-publish dry run (verify tarball contents)
        run: npm pack --dry-run

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (dry run)
        if: ${{ inputs.dry-run }}
        run: npm publish --dry-run --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ !inputs.dry-run }}
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-build
          path: .

      - name: Extract artifact
        run: tar -xzf release-artifact.tar.gz && rm release-artifact.tar.gz

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci --omit=dev

      - name: Pack tarball for release attachment
        run: npm pack --ignore-scripts

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --latest \
            *.tgz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
