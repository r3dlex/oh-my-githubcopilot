name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --version
      - run: npx tsc --noEmit -p .
      - run: npx archgate --version
      - run: npx archgate check
      - run: npm run build
      - run: npm test -- --coverage
      - name: Run archgate check
        run: |
          npx archgate --version
          npx archgate check
      - run: npm run build
      - run: npm test -- --coverage
