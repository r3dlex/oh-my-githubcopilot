name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Tar artifact
        run: tar czf ci-artifact.tar.gz --exclude='.git' --exclude='node_modules/.cache' . || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifact
          path: ci-artifact.tar.gz
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-artifact
          path: .
      - name: Extract artifact
        run: tar xzf ci-artifact.tar.gz && rm ci-artifact.tar.gz
      - run: npm run typecheck
      - run: timeout 120 npm test < /dev/null
      - name: Run archgate check
        run: |
          npx archgate --version
          npx archgate check

  coverage:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-artifact
          path: .
      - name: Extract artifact
        run: tar xzf ci-artifact.tar.gz && rm ci-artifact.tar.gz
      - run: timeout 600 npm run test:coverage < /dev/null

  vscode-omp:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-artifact
          path: .
      - name: Extract artifact
        run: tar xzf ci-artifact.tar.gz && rm ci-artifact.tar.gz
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: vscode-omp/package-lock.json
      - name: Install extension dependencies
        run: cd vscode-omp && npm ci
      - name: Build extension
        run: cd vscode-omp && npm run build --if-present
      - name: Test extension
        run: cd vscode-omp && npm test --if-present
      - name: Package VSIX
        run: cd vscode-omp && npm run package --if-present
      - name: Upload VSIX artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-omp-artifacts
          path: |
            vscode-omp/*.vsix
            vscode-omp/dist/**
            vscode-omp/out/**
          if-no-files-found: ignore
