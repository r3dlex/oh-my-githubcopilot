name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test -- --forceExit
      - name: Run archgate check
        run: |
          npx archgate --version
          npx archgate check

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test -- --coverage --forceExit

  pnpm-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
      - name: Import lockfile
        run: pnpm import
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Pack package
        run: pnpm pack
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-package
          path: "*.tgz"
