<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Oh My Copilot Logo</title>
  <desc>Multi-Agent Orchestration Plugin — Constellation mark with OMP central emblem</desc>

  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <radialGradient id="glow-violet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="star-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Outer constellation ring (dashed orbit) -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#8b5cf6" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.25"/>

  <!-- Outer star field -->
  <g fill="#8b5cf6" opacity="0.4">
    <circle cx="60" cy="60" r="1.2"/>
    <circle cx="340" cy="50" r="1"/>
    <circle cx="350" cy="340" r="1.3"/>
    <circle cx="55" cy="330" r="0.9"/>
    <circle cx="90" cy="120" r="0.8"/>
    <circle cx="310" cy="130" r="1"/>
    <circle cx="305" cy="270" r="0.7"/>
    <circle cx="85" cy="275" r="1.1"/>
    <circle cx="200" cy="40" r="0.9"/>
    <circle cx="200" cy="360" r="0.8"/>
    <circle cx="40" cy="200" r="1"/>
    <circle cx="360" cy="200" r="0.9"/>
  </g>

  <!-- Constellation spokes — connecting lines to outer stars -->
  <g stroke="#7c3aed" stroke-width="0.8" opacity="0.3">
    <line x1="200" y1="200" x2="60" y2="60"/>
    <line x1="200" y1="200" x2="340" y2="50"/>
    <line x1="200" y1="200" x2="350" y2="340"/>
    <line x1="200" y1="200" x2="55" y2="330"/>
    <line x1="200" y1="200" x2="90" y2="120"/>
    <line x1="200" y1="200" x2="310" y2="130"/>
    <line x1="200" y1="200" x2="305" y2="270"/>
    <line x1="200" y1="200" x2="85" y2="275"/>
    <line x1="200" y1="200" x2="200" y2="40"/>
    <line x1="200" y1="200" x2="200" y2="360"/>
    <line x1="200" y1="200" x2="40" y2="200"/>
    <line x1="200" y1="200" x2="360" y2="200"/>
  </g>

  <!-- Inner glow halo -->
  <circle cx="200" cy="200" r="72" fill="url(#glow-violet)" opacity="0.5"/>
  <circle cx="200" cy="200" r="55" fill="url(#glow-blue)" opacity="0.3"/>

  <!-- Central hexagon frame -->
  <polygon points="200,138 254,169 254,231 200,262 146,231 146,169"
    fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>

  <!-- OMP text -->
  <text x="200" y="192" font-family="ui-monospace,SFMono,Menlo,Monaco,Consolas,monospace"
    font-size="32" font-weight="700" fill="#e2e8f0" text-anchor="middle" letter-spacing="3">OMP</text>

  <!-- Dot separator row -->
  <g fill="#a78bfa">
    <circle cx="170" cy="206" r="2"/>
    <circle cx="200" cy="206" r="2"/>
    <circle cx="230" cy="206" r="2"/>
  </g>

  <!-- Bottom label: agents -->
  <text x="200" y="228" font-family="ui-monospace,SFMono,Menlo,Monaco,Consolas,monospace"
    font-size="10" fill="#8b5cf6" text-anchor="middle" letter-spacing="4" opacity="0.9">AGENTS</text>

  <!-- Orbital accent rings -->
  <circle cx="200" cy="200" r="115" fill="none" stroke="#6366f1" stroke-width="0.4" opacity="0.15"/>
  <circle cx="200" cy="200" r="135" fill="none" stroke="#8b5cf6" stroke-width="0.3" opacity="0.1"/>

  <!-- OMP corner nodes -->
  <g filter="url(#star-glow)">
    <circle cx="146" cy="138" r="3" fill="#8b5cf6"/>
    <circle cx="254" cy="138" r="3" fill="#6366f1"/>
    <circle cx="254" cy="262" r="3" fill="#8b5cf6"/>
    <circle cx="146" cy="262" r="3" fill="#6366f1"/>
  </g>

  <!-- Bright center node -->
  <circle cx="200" cy="200" r="4" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="200" cy="200" r="2" fill="#fff" opacity="0.8"/>

  <!-- Title text at top -->
  <text x="200" y="100" font-family="ui-monospace,SFMono,Menlo,Monaco,Consolas,monospace"
    font-size="9" fill="#a78bfa" text-anchor="middle" letter-spacing="2" opacity="0.7">OH MY COPILOT</text>
  <text x="200" y="115" font-family="ui-monospace,SFMono,Menlo,Monaco,Consolas,monospace"
    font-size="7" fill="#6d28d9" text-anchor="middle" letter-spacing="1.5" opacity="0.5">MULTI-AGENT ORCHESTRATION</text>

  <!-- Outer accent stars (bottom cluster) -->
  <g fill="#a78bfa" opacity="0.25">
    <circle cx="120" cy="310" r="0.8"/>
    <circle cx="160" cy="330" r="0.6"/>
    <circle cx="200" cy="320" r="0.9"/>
    <circle cx="240" cy="330" r="0.6"/>
    <circle cx="280" cy="310" r="0.8"/>
    <circle cx="140" cy="350" r="0.5"/>
    <circle cx="260" cy="350" r="0.5"/>
  </g>
</svg>
