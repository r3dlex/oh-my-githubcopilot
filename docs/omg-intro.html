<h1 id="omg-autopilot--%EC%9E%90%EC%9C%A8-%EC%8B%A4%ED%96%89">omg-autopilot — 자율 실행</h1>
<blockquote>
<p>&quot;build me a REST API&quot; → OMG가 <strong>전 과정을 자동 수행</strong></p>
</blockquote>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Phase 1: SPEC          사용자 입력 → 요구사항 정리
    ↓
Phase 2: PLAN          @planner가 작업 계획 수립
    ↓
Phase 3: EXECUTE       @executor가 코드 구현
    ↓
Phase 4: VALIDATE      @verifier가 테스트·검증
    ↓
Phase 5: COMPLETE      모든 기준 통과 확인 후 완료
</code></pre>
<ul>
<li>단계마다 MCP에 상태 저장 → 중단 후 재개 가능</li>
<li><code>@critic</code>의 22% 거부율로 설계 결함을 코딩 전에 포착</li>
</ul>
</section>
