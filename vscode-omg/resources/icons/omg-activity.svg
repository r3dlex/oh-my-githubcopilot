<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Antenna -->
  <line x1="12" y1="1" x2="12" y2="3.5"/>
  <circle cx="12" cy="1" r="0.8" fill="currentColor" stroke="none"/>
  <!-- Robot head -->
  <rect x="6.5" y="3.5" width="11" height="8" rx="2"/>
  <!-- Eyes -->
  <circle cx="9.5" cy="7" r="1.2" fill="currentColor" stroke="none"/>
  <circle cx="14.5" cy="7" r="1.2" fill="currentColor" stroke="none"/>
  <!-- Neck -->
  <line x1="10" y1="11.5" x2="10" y2="13"/>
  <line x1="14" y1="11.5" x2="14" y2="13"/>
  <!-- Brain/Body -->
  <ellipse cx="12" cy="17.5" rx="5.5" ry="4"/>
  <!-- AI label hint (two small dots representing AI chips) -->
  <circle cx="10" cy="17.5" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="14" cy="17.5" r="0.8" fill="currentColor" stroke="none"/>
  <!-- Circuit arms left -->
  <line x1="6.5" y1="16" x2="4" y2="16"/>
  <line x1="6.5" y1="19" x2="4" y2="19"/>
  <!-- Circuit arms right -->
  <line x1="17.5" y1="16" x2="20" y2="16"/>
  <line x1="17.5" y1="19" x2="20" y2="19"/>
</svg>
